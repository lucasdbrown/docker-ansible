---
- name: Install Docker Engine and Docker Compose, verify, and clean up test artifacts
  hosts: all
  become: true
  gather_facts: true

  vars:
    docker_debian_repo_map:
      Kali: bookworm

    docker_packages_debian:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

    docker_packages_redhat:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  pre_tasks:
    - name: Validate supported OS
      ansible.builtin.fail:
        msg: >-
          Unsupported distribution {{ ansible_distribution }} (family: {{ ansible_os_family }}).
          This playbook supports Debian, and RedHat-family systems.
      when:
        - ansible_distribution not in ['Debian', 'Kali']
        - ansible_os_family != 'RedHat'

    - name: Set Docker repo distro for Debian family
      ansible.builtin.set_fact:
        docker_repo_distro: debian
        docker_repo_release: "{{ docker_debian_repo_map.get(ansible_distribution, ansible_distribution_release) }}"
      when: ansible_os_family == 'Debian'

    - name: Set Docker repo details for RedHat family
      ansible.builtin.set_fact:
        docker_repo_distro: centos
        docker_repo_release: "{{ ansible_distribution_major_version }}"
      when: ansible_os_family == 'RedHat'

  tasks:
    - name: Install Docker on Debian and Kali
      when: ansible_os_family == 'Debian'
      block:
        - name: Install apt prerequisites
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
            state: present
            update_cache: true

        - name: Ensure apt keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Download Docker apt GPG key
          ansible.builtin.get_url:
            url: "https://download.docker.com/linux/{{ docker_repo_distro }}/gpg"
            dest: /etc/apt/keyrings/docker.asc
            mode: '0644'
            force: true

        - name: Add Docker apt repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [arch={{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else ansible_architecture }}
              signed-by=/etc/apt/keyrings/docker.asc]
              https://download.docker.com/linux/{{ docker_repo_distro }}
              {{ docker_repo_release }} stable
            state: present
            filename: docker

        - name: Install Docker packages
          ansible.builtin.apt:
            name: "{{ docker_packages_debian }}"
            state: present
            update_cache: true

    - name: Install Docker on RedHat family
      when: ansible_os_family == 'RedHat'
      block:
        - name: Install dnf/yum helper packages
          ansible.builtin.package:
            name:
              - yum-utils
            state: present

        - name: Add Docker yum repository
          ansible.builtin.yum_repository:
            name: docker-ce-stable
            description: Docker CE Stable
            baseurl: "https://download.docker.com/linux/centos/{{ docker_repo_release }}/$basearch/stable"
            enabled: true
            gpgcheck: true
            gpgkey: https://download.docker.com/linux/centos/gpg

        - name: Install Docker packages
          ansible.builtin.package:
            name: "{{ docker_packages_redhat }}"
            state: present

    - name: Verify Docker, run validation tests, and clean up
      block:
        - name: Ensure docker service is enabled and running
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started
            daemon_reload: true

        - name: Wait for Docker socket
          ansible.builtin.wait_for:
            path: /var/run/docker.sock
            state: present
            timeout: 30

        - name: Check docker version
          ansible.builtin.command: docker version
          register: docker_version_check
          changed_when: false

        - name: Check docker compose version
          ansible.builtin.command: docker compose version
          register: docker_compose_version_check
          changed_when: false

        - name: Run hello-world test container
          ansible.builtin.command: docker run --rm hello-world
          register: docker_hello_test
          changed_when: false

        - name: Create temporary directory for compose validation
          ansible.builtin.tempfile:
            state: directory
            suffix: docker-compose-test
          register: compose_test_dir

        - name: Write temporary compose file
          ansible.builtin.copy:
            dest: "{{ compose_test_dir.path }}/compose.yml"
            mode: '0644'
            content: |
              services:
                test:
                  image: alpine:latest
                  command: ["sh", "-c", "echo compose-ok"]

        - name: Run docker compose validation
          ansible.builtin.command:
            cmd: docker compose -f {{ compose_test_dir.path }}/compose.yml up --abort-on-container-exit --quiet-pull
          register: compose_up_result
          changed_when: false
          failed_when: >-
            compose_up_result.rc != 0 or
            ('compose-ok' not in compose_up_result.stdout and 'compose-ok' not in compose_up_result.stderr)

      rescue:
        - name: Gather docker service status
          ansible.builtin.command: systemctl status docker --no-pager
          register: docker_service_status
          changed_when: false
          failed_when: false

        - name: Gather docker journal logs
          ansible.builtin.command: journalctl -u docker --no-pager -n 100
          register: docker_journal_logs
          changed_when: false
          failed_when: false

        - name: Print troubleshooting output
          ansible.builtin.debug:
            msg:
              - "Docker version: {{ docker_version_check.stdout | default('unavailable') }}"
              - "Docker Compose version: {{ docker_compose_version_check.stdout | default('unavailable') }}"
              - "systemctl status docker: {{ docker_service_status.stdout | default('unavailable') }}"
              - "journalctl -u docker: {{ docker_journal_logs.stdout | default('unavailable') }}"

        - name: Fail clearly after troubleshooting collection
          ansible.builtin.fail:
            msg: >-
              Docker installation or validation failed. Review the play output above for version checks,
              service status, and recent docker logs.

      always:
        - name: Tear down compose validation stack
          ansible.builtin.command:
            cmd: docker compose -f {{ compose_test_dir.path }}/compose.yml down --volumes --remove-orphans
          changed_when: false
          failed_when: false
          when: compose_test_dir is defined and compose_test_dir.path is defined

        - name: Remove temporary compose validation directory
          ansible.builtin.file:
            path: "{{ compose_test_dir.path }}"
            state: absent
          when: compose_test_dir is defined and compose_test_dir.path is defined

        - name: Remove hello-world image if present
          ansible.builtin.command: docker image rm hello-world
          changed_when: false
          failed_when: false

        - name: Remove alpine image if present
          ansible.builtin.command: docker image rm alpine:latest
          changed_when: false
          failed_when: false

        - name: Show success summary
          ansible.builtin.debug:
            msg:
              - "Docker install complete."
              - "{{ docker_version_check.stdout | default('docker version unavailable') }}"
              - "{{ docker_compose_version_check.stdout | default('docker compose version unavailable') }}"
              - "hello-world container test passed."
              - "docker compose test passed."
          when:
            - docker_version_check is defined
            - docker_compose_version_check is defined
            - docker_hello_test is defined
            - compose_up_result is defined
            - docker_hello_test.rc == 0
            - compose_up_result.rc == 0
